<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>consent — oidc demo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.2/src/light/style.css" />
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-white">
  <div id="root"></div>
  <script type="text/babel">
    function ConsentPage() {
      const params    = new URLSearchParams(window.location.search);
      const returnUrl = params.get('ReturnUrl') || params.get('returnUrl') || '/';

      const [ctx,      setCtx]      = React.useState(null);
      const [checked,  setChecked]  = React.useState({});
      const [remember, setRemember] = React.useState(true);
      const [loading,  setLoading]  = React.useState(false);
      const [error,    setError]    = React.useState(null);

      React.useEffect(() => {
        fetch(`/api/ids/consent?returnUrl=${encodeURIComponent(returnUrl)}`)
          .then(r => {
            if (!r.ok) throw new Error(r.status);
            return r.json();
          })
          .then(d => {
            setCtx(d);
            // pre-check all scopes
            const init = {};
            (d.scopes ?? []).forEach(s => { init[s.value] = true; });
            setChecked(init);
          })
          .catch(() => setError('failed to load consent context. the session may have expired.'));
      }, []);

      const respond = async (allow) => {
        setLoading(true);
        setError(null);
        try {
          const scopes = allow
            ? Object.entries(checked).filter(([, v]) => v).map(([k]) => k)
            : [];
          const res = await fetch('/api/ids/consent', {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify({ allow, scopes, remember, returnUrl }),
          });
          const data = await res.json();
          if (!res.ok) { setError(data.error ?? 'consent failed. try again.'); return; }
          window.location.href = data.redirectUrl;
        } catch {
          setError('something went wrong. try again.');
        } finally {
          setLoading(false);
        }
      };

      if (!ctx) return (
        <div className="min-h-screen flex items-center justify-center">
          <p className="text-xs text-gray-300 lowercase">{error ?? 'loading...'}</p>
        </div>
      );

      return (
        <div className="min-h-screen flex items-center justify-center">
          <div className="w-full max-w-sm px-8 py-12">
            <p className="text-xs tracking-widest text-gray-400 uppercase mb-1">oidc demo</p>
            <h1 className="text-sm text-gray-700 lowercase mb-2">consent</h1>
            <p className="text-xs text-gray-400 lowercase mb-6">
              <span className="text-gray-600">{ctx.clientName}</span> is requesting access:
            </p>

            {error && <p className="text-xs text-red-500 mb-4 lowercase">{error}</p>}

            <div className="flex flex-col gap-3 mb-6 divide-y divide-gray-100">
              {(ctx.scopes ?? []).map(scope => (
                <label key={scope.value} className="flex items-start gap-3 cursor-pointer group pt-3 first:pt-0">
                  <input
                    type="checkbox"
                    checked={scope.required ? true : (checked[scope.value] ?? true)}
                    disabled={scope.required}
                    onChange={e => setChecked(c => ({ ...c, [scope.value]: e.target.checked }))}
                    className="accent-gray-500 w-3.5 h-3.5 mt-0.5 cursor-pointer flex-shrink-0"
                  />
                  <span className="flex flex-col gap-0.5">
                    <span className="text-sm text-gray-700 lowercase">
                      {scope.displayName}
                      {scope.required && <span className="text-xs text-gray-400 ml-1">(required)</span>}
                    </span>
                    {scope.description && (
                      <span className="text-xs text-gray-400 lowercase">{scope.description}</span>
                    )}
                  </span>
                </label>
              ))}
            </div>

            <label className="flex items-center gap-3 cursor-pointer mb-6">
              <input
                type="checkbox"
                checked={remember}
                onChange={e => setRemember(e.target.checked)}
                className="accent-gray-500 w-3.5 h-3.5 cursor-pointer"
              />
              <span className="text-sm text-gray-500 lowercase">remember this decision</span>
            </label>

            <div className="flex gap-6">
              <button
                onClick={() => respond(true)}
                disabled={loading}
                className="text-sm text-gray-600 hover:text-gray-900 transition-colors lowercase disabled:opacity-30"
              >
                {loading ? 'saving...' : 'allow →'}
              </button>
              <button
                onClick={() => respond(false)}
                disabled={loading}
                className="text-sm text-gray-400 hover:text-red-400 transition-colors lowercase disabled:opacity-30"
              >
                deny
              </button>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<ConsentPage />);
  </script>
</body>
</html>
