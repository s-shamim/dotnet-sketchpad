<!DOCTYPE html>
<html data-theme="zinc-light">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>rest client</title>

  <!-- 1. Flash-prevention -->
  <script>
    (function() {
      var t = localStorage.getItem('ui-theme') || 'zinc';
      var m = localStorage.getItem('ui-mode')  || 'light';
      document.documentElement.setAttribute('data-theme', t + '-' + m);
    })();
  </script>

  <!-- 2. React 18 + ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <!-- 3. Babel (JSX transform) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- 4. Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- 5. Tailwind config -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
          },
          colors: {
            white: 'var(--color-white)',
            gray: {
              50:  'var(--gray-50)',
              100: 'var(--gray-100)',
              200: 'var(--gray-200)',
              300: 'var(--gray-300)',
              400: 'var(--gray-400)',
              500: 'var(--gray-500)',
              600: 'var(--gray-600)',
              700: 'var(--gray-700)',
              800: 'var(--gray-800)',
              900: 'var(--gray-900)',
            }
          }
        }
      }
    }
  </script>

  <!-- 6. Theme CSS vars -->
  <link rel="stylesheet" href="themes.css" />

  <!-- 7. Inter font -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />

  <!-- 8. Phosphor icons (ph-light) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.2/src/light/style.css" />

  <style>
    * { box-sizing: border-box; }
    html, body, #root { height: 100%; margin: 0; padding: 0; overflow: hidden; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--gray-300); border-radius: 2px; }

    /* Drag cursors */
    .drag-h { cursor: row-resize; }
    .drag-v { cursor: col-resize; }

    /* Tab underline */
    .tab-active { border-bottom: 1.5px solid var(--gray-900); }
  </style>
</head>

<body>
  <div id="root"></div>

  <!-- Component files first, app.jsx last -->
  <script type="text/babel" src="components/TopBar.jsx?v=1"></script>
  <script type="text/babel" src="components/ActivityBar.jsx?v=1"></script>
  <script type="text/babel" src="components/SidePanel.jsx?v=1"></script>
  <script type="text/babel" src="components/RequestTabs.jsx?v=1"></script>
  <script type="text/babel" src="components/RequestShoulder.jsx?v=1"></script>
  <script type="text/babel" src="components/UrlBar.jsx?v=1"></script>
  <script type="text/babel" src="components/InputPane.jsx?v=1"></script>
  <script type="text/babel" src="components/OutputPane.jsx?v=1"></script>
  <script type="text/babel" src="components/ConsolePanel.jsx?v=1"></script>
  <script type="text/babel" src="components/EnvModal.jsx?v=1"></script>
  <script type="text/babel" src="components/CollectionModal.jsx?v=1"></script>
  <script type="text/babel" src="app.jsx?v=1"></script>
</body>

</html>
